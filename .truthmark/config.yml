version: 2
platforms:
  - codex
  - opencode
  - claude-code
  - github-copilot
  - antigravity
  - cursor
truthmark:
  workspace: docs/truthmark
  generated:
    portal:
      enabled: false
instruction_targets:
  - AGENTS.md
frontmatter:
  required: []
  recommended:
    - status
    - last_reviewed
ignore:
  - node_modules/**
  - vendor/**
  - dist/**
  - build/**
