must_read:
  - .truthmark/config.yml
  - docs/truthmark/routes/areas.md
  - README.md

must_change:
  []

must_not_change:
  - src/**
  - docs/truthmark/engineering/**

must_run_or_explain:
  - npx tsx src/cli/main.ts check --json

report:
  required: false
  validator: none

assertions:

  - id: write-boundary
    kind: diff
    pass: changed files stay inside the workflow boundary
